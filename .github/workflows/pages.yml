name: Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Prepare public site
        run: |
          rm -rf public-site
          mkdir -p public-site
          cp docs/index.html docs/styles.css docs/favicon.svg public-site/
          cp -R docs/assets public-site/assets

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

      - id: deployment
        uses: actions/deploy-pages@v4
