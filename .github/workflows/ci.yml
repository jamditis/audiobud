# AudioBud CI (milestone A): fast correctness checks on every push/PR - lint,
# formatting, types, and unit tests (frontend) plus cargo test against a mock
# transcription backend (no GPU). Native packaging/bundling and the signed
# release + updater pipeline are deliberately milestone B: they need AudioBud's
# own signing identity and provenance, not the inherited cjpais/Handy config.
# See superpowers/DEFERRED-issues.md ("Milestone B" section).
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, format, types, unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking: 34 milestone-A keys are English-only across the 19 locales,
      # and i18next falls back to English at runtime (fallbackLng: "en"), so this
      # is localization debt, not a functional gap. The check still runs and
      # annotates the missing keys; flip continue-on-error off once the locales
      # are complete. See superpowers/DEFERRED-issues.md.
      - name: Check translation consistency
        run: bun run check:translations
        continue-on-error: true

      - name: Lint
        run: bun run lint

      - name: Prettier + cargo fmt check
        run: bun run format:check

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun run test

  rust-tests:
    name: Rust tests (mock transcription, no GPU)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        timeout-minutes: 8
        run: |
          # DEBIAN_FRONTEND must ride inside sudo (env_reset strips a step-level
          # env: before apt/dpkg ever see it), so set it as a sudo argument.
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -o Acquire::Retries=3
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -o Acquire::Retries=3 libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libssl-dev libgtk-layer-shell-dev

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Use mock TranscriptionManager (CI only)
        working-directory: src-tauri
        run: |
          # Swap to the mock adapter so cargo test does not compile whisper/Vulkan/ONNX.
          cp src/managers/transcription_mock.rs src/managers/transcription.rs
          sed -i '/^transcribe-rs/d' Cargo.toml

      - name: Download the VAD model (unicode-path ONNX regression test)
        working-directory: src-tauri
        run: |
          # silero_vad_loads_from_unicode_directory fails in CI when the model
          # is absent instead of skipping silently, so keep this step ahead of
          # cargo test.
          mkdir -p resources/models
          curl --fail --retry 3 -o resources/models/silero_vad_v4.onnx https://blob.handy.computer/silero_vad_v4.onnx

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # gitleaks-action lists the PR's commits to scope its scan, which needs
    # pull-requests: read; the default GITHUB_TOKEN does not grant it. Keep the
    # token read-only and turn off PR comments so it never needs write access.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
